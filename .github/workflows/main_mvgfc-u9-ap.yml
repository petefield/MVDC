# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Deploy - API

on:
  push:
    branches:
      - main
    paths:
      - 'src/MVDC.Api/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Build with dotnet
        run: dotnet build --configuration Release

      - name: dotnet publish
        run: dotnet publish -c Release -o ${{env.DOTNET_ROOT}}/myapp

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Configure App Settings
        uses: azure/appservice-settings@v1
        with:
          app-name: 'mvgfc-u9-ap'
          app-settings-json: |
            [
              { "name": "CosmosDb__ConnectionString", "value": "${{ secrets.COSMOSDB_CONNECTION_STRING }}", "slotSetting": false },
              { "name": "Jwt__Key", "value": "${{ secrets.JWT_KEY }}", "slotSetting": false },
              { "name": "Cors__AllowedOrigins", "value": "${{ secrets.CORS_ALLOWED_ORIGINS }}", "slotSetting": false }
            ]

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'mvgfc-u9-ap'
          slot-name: 'Production'
          package: .
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_FC8468CAF1E7481D8E96478F3FF25363 }}