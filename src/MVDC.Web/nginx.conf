events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    types {
        application/wasm wasm;
    }

    server {
        listen 80;
        root /usr/share/nginx/html;
        index index.html;

        # ── Security headers ──────────────────────────────────────
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ── Cache policy: never cache config or the shell page ────
        location ~* appsettings.*\.json$ {
            add_header Cache-Control "no-store, no-cache, must-revalidate" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "DENY" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        }

        location = /index.html {
            add_header Cache-Control "no-store, no-cache, must-revalidate" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "DENY" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        }

        # ── Cache policy: content-hashed framework assets (immutable) ──
        location /_framework/ {
            add_header Cache-Control "public, max-age=31536000, immutable" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "DENY" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        }

        # ── Cache policy: static assets (images, fonts) ───────────
        location ~* \.(png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
            add_header Cache-Control "public, max-age=86400" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "DENY" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        }

        # ── Cache policy: app CSS/JS (not content-hashed, short cache) ──
        location ~* \.(css|js)$ {
            add_header Cache-Control "public, max-age=3600, must-revalidate" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "DENY" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        }

        # ── Blazor WASM SPA routing ──────────────────────────────
        location / {
            try_files $uri $uri/ /index.html;
        }

        # ── Compression ──────────────────────────────────────────
        gzip_static on;
        gzip on;
        gzip_types application/wasm application/javascript application/json text/css text/html;
    }
}
