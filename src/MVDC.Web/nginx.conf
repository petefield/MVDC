events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    types {
        application/wasm wasm;
    }

    server {
        listen 80;
        root /usr/share/nginx/html;
        index index.html;

        # Prevent browsers from caching config files so environment-specific
        # values (like ApiBaseAddress) always reflect the current deployment.
        location ~* appsettings.*\.json$ {
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }

        # Prevent caching of CSS and JS so style/code changes take effect immediately.
        location ~* \.(css|js)$ {
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }

        # Blazor WASM SPA routing — serve index.html for any route that
        # doesn't match a static file so client-side routing works.
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Serve pre-compressed gzip files when available (_framework assets).
        gzip_static on;

        # Fall back to dynamic gzip for anything not pre-compressed.
        gzip on;
        gzip_types application/wasm application/javascript application/json text/css text/html;
    }
}
